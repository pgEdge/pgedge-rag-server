# Multi-host configuration for testing
pipelines:
    - name: "multi-host-pipeline"
      database:
          hosts:
              - host: "postgres-n1"
                port: 5432
              - host: "postgres-n2"
                port: 5432
              - host: "postgres-n3"
                port: 5433
          target_session_attrs: "prefer-standby"
          database: "testdb"
          username: "testuser"
          password: "testpass"
          ssl_mode: "prefer"
      tables:
          - table: "documents"
            text_column: "content"
            vector_column: "embedding"
      embedding_llm:
          provider: "openai"
          model: "text-embedding-3-small"
      rag_llm:
          provider: "anthropic"
          model: "claude-sonnet-4-20250514"
