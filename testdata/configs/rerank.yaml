pipelines:
  - name: "rerank-pipeline"
    database:
      host: "localhost"
      database: "testdb"
    tables:
      - table: "documents"
        text_column: "content"
        vector_column: "embedding"
    embedding_llm:
      provider: "openai"
      model: "text-embedding-3-small"
    rag_llm:
      provider: "anthropic"
      model: "claude-sonnet-4-20250514"
    rerank:
      provider: "voyage"
      model: "rerank-2"
      top_k: 5
      request_timeout: "30s"
      per_attempt_timeout: "10s"
